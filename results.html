<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results — Hucenrotia Selection</title>
  <meta name="description" content="Quiz results for the Hucenrotia TEEP Internship selection quiz">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="results-page" id="resultsPage">
    <canvas id="confettiCanvas"></canvas>

    <div class="results-card anim-pop">
      <!-- Emoji & Title -->
      <div class="results-emoji" id="resultsEmoji">🎉</div>
      <div class="results-title" id="resultsTitle">Amazing!</div>
      <div class="results-subtitle" id="resultsSubtitle">You completed the quiz!</div>

      <!-- Stats grid -->
      <div class="results-stats">
        <div class="result-stat">
          <div class="result-stat-icon">✅</div>
          <div class="result-stat-value" id="statCorrect">—</div>
          <div class="result-stat-label">Correct</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-icon">⚡</div>
          <div class="result-stat-value" id="statXP">—</div>
          <div class="result-stat-label">XP Earned</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-icon">⏱️</div>
          <div class="result-stat-value" id="statTime">—</div>
          <div class="result-stat-label">Time</div>
        </div>
      </div>

      <!-- Accuracy bar -->
      <div style="margin-bottom:0.5rem;display:flex;justify-content:space-between;font-size:0.82rem;font-weight:700;color:var(--text-muted)">
        <span>Accuracy</span>
        <span id="accuracyPct">—</span>
      </div>
      <div class="results-accuracy-bar-wrap" style="margin-bottom:2rem">
        <div class="results-accuracy-fill" id="accuracyBar" style="width:0%"></div>
      </div>

      <!-- Course badge -->
      <div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:0.8rem 1rem;margin-bottom:2rem;text-align:left;display:flex;align-items:center;gap:0.75rem">
        <span style="font-size:1.6rem" id="courseBadgeIcon">🤖</span>
        <div>
          <div style="font-weight:800;color:var(--white);font-size:0.95rem" id="courseBadgeName">HIMLoco</div>
          <div style="font-size:0.78rem;color:var(--text-muted)" id="courseBadgeDesc">Quiz completed</div>
        </div>
        <div style="margin-left:auto;font-size:1.2rem" id="courseBadgeStar">⭐</div>
      </div>

      <!-- Leaderboard -->
      <div style="margin-top:2rem">
        <h3 style="text-align:left;color:var(--text-muted);font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:0.5rem">🏆 Live Leaderboard</h3>
        <div class="leaderboard" id="leaderboardContainer">
          <div class="leaderboard-header">
            <div>Rank</div>
            <div>Candidate</div>
            <div style="text-align:right">Score</div>
            <div style="text-align:right">XP</div>
          </div>
          <div id="leaderboardBody"></div>
        </div>
      </div>

      <!-- Actions -->
      <div class="results-actions" style="margin-top:2rem">
        <button class="btn-primary" id="btnHome" style="border-color:var(--text-muted);color:var(--bg)">🏠 Back to Home</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const result = App.getState().lastResult || {};
      const correct = result.correct || 0;
      const total   = result.total || 25;
      const xp      = result.xp || 0;
      const elapsed = result.elapsed || 0;
      const course  = result.course || 'himloco';
      const pct     = Math.round((correct / total) * 100);

      // Emoji & message
      let emoji, title, subtitle;
      if (pct >= 90)      { emoji='🏆'; title='Outstanding!';    subtitle='You nailed it! Near-perfect score!'; }
      else if (pct >= 75) { emoji='🎉'; title='Excellent Work!';  subtitle='Great understanding of the research!'; }
      else if (pct >= 60) { emoji='😊'; title='Good Job!';        subtitle='Solid performance — keep learning!'; }
      else if (pct >= 40) { emoji='📚'; title='Keep Studying!';   subtitle='Review the papers and try again.'; }
      else                { emoji='💪'; title='Don\'t Give Up!';  subtitle='Read the papers carefully and retry!'; }

      document.getElementById('resultsEmoji').textContent = emoji;
      document.getElementById('resultsTitle').textContent = title;
      document.getElementById('resultsSubtitle').textContent = subtitle;

      document.getElementById('statCorrect').textContent = correct + '/' + total;
      document.getElementById('statXP').textContent = '+' + xp;

      const mins = Math.floor(elapsed / 60);
      const secs = elapsed % 60;
      document.getElementById('statTime').textContent = mins > 0 ? mins + 'm ' + secs + 's' : secs + 's';

      document.getElementById('accuracyPct').textContent = pct + '%';

      // Accuracy bar (animated after short delay)
      setTimeout(() => {
        const bar = document.getElementById('accuracyBar');
        bar.style.width = pct + '%';
        bar.className = 'results-accuracy-fill ' + (pct >= 75 ? 'accuracy-good' : pct >= 50 ? 'accuracy-mid' : 'accuracy-low');
      }, 300);

      // Course badge
      const courseNames = { himloco: 'HIMLoco', navila: 'NaVILA' };
      const courseIcons = { himloco: '🤸', navila: '🗺️' };
      const courseDescs = {
        himloco: 'Hybrid Internal Model · ICLR 2024',
        navila:  'Vision-Language-Action · RSS 2025'
      };
      document.getElementById('courseBadgeIcon').textContent = courseIcons[course] || '🤖';
      document.getElementById('courseBadgeName').textContent = courseNames[course] || course;
      document.getElementById('courseBadgeDesc').textContent = courseDescs[course] || 'Quiz completed';

      const stars = pct >= 90 ? '⭐⭐⭐' : pct >= 70 ? '⭐⭐' : '⭐';
      document.getElementById('courseBadgeStar').textContent = stars;

      // Confetti if good score
      if (pct >= 70) {
        launchConfetti(document.getElementById('confettiCanvas'));
      }

      // Fetch and render Leaderboard
      const lbData = App.getLeaderboard(course);
      const lbBody = document.getElementById('leaderboardBody');
      if (lbData.length === 0) {
        lbBody.innerHTML = '<div style="padding:1.5rem;text-align:center;color:var(--text-muted)">No candidates yet.</div>';
      } else {
        lbBody.innerHTML = lbData.map((u, i) => {
          const rank = i + 1;
          const rankClass = rank === 1 ? 'top-1' : rank === 2 ? 'top-2' : rank === 3 ? 'top-3' : '';
          return `
            <div class="leaderboard-row">
              <div class="lb-rank ${rankClass}">#${rank}</div>
              <div style="text-align:left">
                <div class="lb-name">${u.name}</div>
                <div class="lb-email">${u.email}</div>
              </div>
              <div class="lb-score">${u.score}/${u.total}</div>
              <div class="lb-xp">${u.xp}</div>
            </div>
          `;
        }).join('');
      }

      // Buttons
      document.getElementById('btnHome').addEventListener('click', () => {
        window.location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
