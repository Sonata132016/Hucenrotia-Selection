<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — Hucenrotia Selection</title>
  <meta name="description" content="AI Robotics research quiz — HIMLoco and NaVILA">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .quiz-body-inner { max-width: 720px; margin: 0 auto; }
    body { padding-bottom: 80px; }
  </style>
</head>
<body>

  <!-- Quiz Header -->
  <header class="quiz-header" id="quizHeader">
    <div class="container">
      <button class="btn-close" id="btnClose" title="Quit quiz">✕</button>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="hearts" id="hearts"></div>
      <div class="xp-counter" id="xpCounter">⚡ 0 XP</div>
    </div>
  </header>

  <!-- Quiz Body -->
  <main class="quiz-body">
    <div class="container quiz-body-inner">
      <div class="question-counter" id="questionLabel">
        <span class="qc-dot"></span> Loading...
      </div>

      <!-- Image (hidden by default) -->
      <div class="question-image-wrap" id="imageWrap" style="display:none">
        <img id="questionImg" src="" alt="Paper figure">
        <div class="img-caption" id="imgCaption"></div>
      </div>

      <div class="question-text" id="questionText">Loading question...</div>

      <!-- Dynamic options area -->
      <div id="optionsArea"></div>

      <!-- Check button (hidden when feedback bar is active) -->
      <div class="quiz-footer" id="quizFooter">
        <div class="container" style="max-width:720px">
          <button class="btn-check idle" id="btnCheck" disabled>CHECK</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Feedback Bar (slides up from bottom) -->
  <div class="feedback-bar" id="feedbackBar">
    <div class="feedback-inner">
      <div class="feedback-message">
        <div class="feedback-title" id="feedbackTitle"></div>
        <div class="feedback-explain" id="feedbackExplain"></div>
      </div>
      <button class="btn-continue" id="btnContinue">CONTINUE →</button>
    </div>
  </div>

  <!-- XP Popup -->
  <div class="xp-popup" id="xpPopup">+10 XP!</div>

  <!-- Quit Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-emoji">🤔</div>
      <h2>Quit the quiz?</h2>
      <p>Your progress will be saved but this session's XP will be counted so far.</p>
      <div class="modal-actions">
        <button class="btn-primary" id="modalCancel">Keep Going!</button>
        <button class="btn-secondary" id="modalQuit">Yes, quit</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/quiz.js"></script>
  <script>
    // Enable the check button properly — bridge between idle and enabled state
    document.addEventListener('DOMContentLoaded', () => {
      const btnCheck = document.getElementById('btnCheck');
      // Remove HTML disabled attr; our JS handles the visual state
      btnCheck.removeAttribute('disabled');
    });
  </script>
</body>
</html>
